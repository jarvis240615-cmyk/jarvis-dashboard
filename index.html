<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ JARVIS OPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #04020F;
    --bg2: #080518;
    --blue: #0055FF;
    --blue-glow: rgba(0,85,255,0.3);
    --purple: #8B5CF6;
    --purple-glow: rgba(139,92,246,0.3);
    --green: #10B981;
    --red: #EF4444;
    --orange: #F59E0B;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --text: #E8E6F0;
    --text-muted: #6B6882;
    --text-dim: #9997B0;
    --card-hover: rgba(255,255,255,0.06);
    --sidebar-w: 220px;
    --chat-w: 320px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* Ambient glows */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,85,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .glow-right {
    position: fixed;
    bottom: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(139,92,246,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 64px;
    background: rgba(4,2,15,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    z-index: 100;
    gap: 24px;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 20px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }

  .kpi-row {
    display: flex;
    gap: 12px;
    flex: 1;
    overflow: hidden;
  }

  .kpi-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 8px 16px;
    min-width: 110px;
    flex: 1;
    max-width: 160px;
    transition: all 0.2s;
    cursor: default;
  }

  .kpi-card:hover { background: var(--card-hover); }
  .kpi-card.todo { border-color: rgba(0,85,255,0.4); }
  .kpi-card.inprogress { border-color: rgba(139,92,246,0.4); }
  .kpi-card.done { border-color: rgba(16,185,129,0.4); }
  .kpi-card.urgent { border-color: rgba(239,68,68,0.4); }

  .kpi-icon { font-size: 18px; }
  .kpi-info { display: flex; flex-direction: column; }
  .kpi-count {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 20px;
    line-height: 1;
    transition: all 0.3s;
  }
  .kpi-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-card.todo .kpi-count { color: var(--blue); }
  .kpi-card.inprogress .kpi-count { color: var(--purple); }
  .kpi-card.done .kpi-count { color: var(--green); }
  .kpi-card.urgent .kpi-count { color: var(--red); }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .btn-new-task {
    display: flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px var(--blue-glow);
    white-space: nowrap;
  }
  .btn-new-task:hover { transform: translateY(-1px); box-shadow: 0 4px 24px var(--blue-glow); }
  .btn-new-task:active { transform: translateY(0); }

  /* LAYOUT */
  .layout {
    display: flex;
    height: calc(100vh - 64px);
    margin-top: 64px;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: rgba(4,2,15,0.6);
    border-right: 1px solid var(--glass-border);
    padding: 20px 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: width 0.3s ease;
  }

  .sidebar.collapsed { width: 0; overflow: hidden; padding: 0; }

  .sidebar-section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    padding: 4px 8px 8px;
    font-weight: 600;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    transition: all 0.15s;
    border: 1px solid transparent;
    background: none;
    width: 100%;
    text-align: left;
  }
  .filter-btn:hover { background: var(--glass); color: var(--text); }
  .filter-btn.active { background: var(--glass); color: var(--text); border-color: var(--glass-border); }
  .filter-btn .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .sidebar-divider { border: none; border-top: 1px solid var(--glass-border); margin: 8px 0; }

  /* KANBAN */
  .kanban {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 20px;
    display: flex;
    gap: 16px;
    min-width: 0;
  }

  .kanban-col {
    flex: 1;
    min-width: 220px;
    max-width: 300px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    margin-bottom: 4px;
  }

  .col-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .col-count {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .col-header.todo .col-title { color: var(--blue); }
  .col-header.inprogress .col-title { color: var(--purple); }
  .col-header.done .col-title { color: var(--green); }
  .col-header.blocked .col-title { color: var(--red); }

  .col-tasks {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-right: 4px;
  }

  .col-tasks::-webkit-scrollbar { width: 4px; }
  .col-tasks::-webkit-scrollbar-track { background: transparent; }
  .col-tasks::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

  /* TASK CARD */
  .task-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeInUp 0.3s ease;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .task-card:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.12); transform: translateY(-1px); }
  .task-card:hover::before { opacity: 1; }

  .task-card.urgent-card::before { background: linear-gradient(90deg, var(--red), transparent); }
  .task-card.high-card::before { background: linear-gradient(90deg, var(--orange), transparent); }
  .task-card.medium-card::before { background: linear-gradient(90deg, var(--blue), transparent); }
  .task-card.low-card::before { background: linear-gradient(90deg, var(--text-muted), transparent); }

  .task-title {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.4;
    margin-bottom: 8px;
    color: var(--text);
  }

  .task-meta {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }

  .category-pill {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .priority-badge {
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 3px;
    color: var(--text-dim);
  }

  .due-date {
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 3px;
    margin-left: auto;
  }

  /* Task expanded */
  .task-expanded {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--glass-border);
    display: none;
  }

  .task-card.expanded .task-expanded { display: block; }

  .task-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .task-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .task-btn {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .task-btn:hover { background: var(--card-hover); color: var(--text); }
  .task-btn.danger:hover { border-color: var(--red); color: var(--red); }
  .task-btn.primary:hover { border-color: var(--blue); color: var(--blue); }

  /* CHAT PANEL */
  .chat-panel {
    width: var(--chat-w);
    flex-shrink: 0;
    background: rgba(4,2,15,0.7);
    border-left: 1px solid var(--glass-border);
    display: flex;
    flex-direction: column;
    transition: width 0.3s ease;
  }

  .chat-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .chat-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chat-status {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

  .msg-bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.5;
    animation: msgIn 0.3s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: scale(0.95) translateY(4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .msg-shrey {
    align-self: flex-end;
    background: linear-gradient(135deg, #0044CC, var(--blue));
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg-jarvis {
    align-self: flex-start;
    background: rgba(139,92,246,0.15);
    border: 1px solid rgba(139,92,246,0.3);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 9px;
    opacity: 0.5;
    margin-top: 4px;
    text-align: right;
  }

  .msg-jarvis .msg-time { text-align: left; }

  .chat-input-area {
    padding: 16px;
    border-top: 1px solid var(--glass-border);
    flex-shrink: 0;
  }

  .chat-input-wrap {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .chat-textarea {
    flex: 1;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    resize: none;
    min-height: 42px;
    max-height: 100px;
    transition: border-color 0.2s;
    outline: none;
  }

  .chat-textarea::placeholder { color: var(--text-muted); }
  .chat-textarea:focus { border-color: rgba(139,92,246,0.5); }

  .btn-send {
    background: linear-gradient(135deg, var(--purple), var(--blue));
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    color: #fff;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 0 16px var(--purple-glow);
  }
  .btn-send:hover { transform: scale(1.05); box-shadow: 0 4px 20px var(--purple-glow); }

  .shortcut-hint {
    font-size: 10px;
    color: var(--text-muted);
    text-align: right;
    margin-top: 6px;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4,2,15,0.8);
    backdrop-filter: blur(8px);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: #0C0A1A;
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 28px;
    width: 460px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    transform: scale(0.95) translateY(10px);
    transition: transform 0.2s;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 40px var(--blue-glow);
  }

  .modal-overlay.open .modal { transform: scale(1) translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .modal-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 18px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: rgba(0,85,255,0.5);
  }

  .form-textarea { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .form-select option { background: #0C0A1A; color: var(--text); }

  .btn-save {
    width: 100%;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    box-shadow: 0 0 24px var(--blue-glow);
  }
  .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 30px var(--blue-glow); }

  /* Scrollbar styles */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

  /* Category colors */
  .cat-website { background: rgba(0,85,255,0.15); color: #6699FF; }
  .cat-sales { background: rgba(16,185,129,0.15); color: #34D399; }
  .cat-seo { background: rgba(245,158,11,0.15); color: #FCD34D; }
  .cat-dev, .cat-development { background: rgba(139,92,246,0.15); color: #A78BFA; }
  .cat-flairns, .cat-flair { background: rgba(236,72,153,0.15); color: #F472B6; }
  .cat-general { background: rgba(107,104,130,0.15); color: #9997B0; }
  .cat-hr { background: rgba(239,68,68,0.15); color: #FCA5A5; }

  .empty-col {
    color: var(--text-muted);
    font-size: 12px;
    text-align: center;
    padding: 20px 0;
    border: 1px dashed var(--glass-border);
    border-radius: 8px;
  }

  /* Loading */
  .loading-dots { display: inline-flex; gap: 4px; }
  .loading-dots span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: dotBounce 1s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes dotBounce {
    0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
    40% { transform: scale(1.2); opacity: 1; }
  }

  /* Toggle sidebar button */
  .toggle-sidebar {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    font-size: 16px;
    transition: color 0.15s;
  }
  .toggle-sidebar:hover { color: var(--text); }

  /* ── MOBILE NAV TABS ── */
  .mobile-tabs {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(4,2,15,0.97);
    border-top: 1px solid var(--glass-border);
    z-index: 200;
    justify-content: space-around;
    align-items: center;
  }
  .mobile-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 0;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3px;
    border: none;
    background: none;
    transition: color 0.2s;
  }
  .mobile-tab span { font-size: 18px; }
  .mobile-tab.active { color: var(--purple); }
  .mobile-tab.active span { filter: drop-shadow(0 0 6px var(--purple)); }

  /* ── MOBILE PANEL SYSTEM ── */
  .mobile-panel {
    display: none;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    body { overflow: auto; }

    /* Header */
    .header {
      padding: 0 14px;
      gap: 10px;
      height: 56px;
    }
    .logo { font-size: 17px; }
    .kpi-row { gap: 6px; }
    .kpi-card {
      min-width: 70px;
      max-width: 90px;
      padding: 6px 8px;
      gap: 6px;
    }
    .kpi-icon { font-size: 14px; }
    .kpi-count { font-size: 16px; }
    .kpi-label { font-size: 9px; }
    .btn-new-task { padding: 7px 10px; font-size: 12px; }
    .btn-new-task span:first-child { display: none; }

    /* Layout — stack panels */
    .layout {
      flex-direction: column;
      height: auto;
      margin-top: 56px;
      overflow: visible;
      padding-bottom: 60px;
    }

    /* Sidebar hidden by default, shown as bottom sheet */
    .sidebar {
      display: none;
    }

    /* Kanban — vertical scroll, single column view */
    .kanban {
      flex-direction: column;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 12px;
      gap: 12px;
      min-height: unset;
    }
    .kanban-col {
      min-width: unset;
      max-width: 100%;
      flex: none;
      width: 100%;
    }
    .col-header { padding: 8px 10px; margin-bottom: 6px; }

    /* Chat panel — full width, fixed height */
    .chat-panel {
      width: 100% !important;
      border-left: none;
      border-top: 1px solid var(--glass-border);
      height: 420px;
      flex-shrink: 0;
    }

    /* Mobile tabs visible */
    .mobile-tabs { display: flex; }

    /* Panel visibility via JS toggling .hidden-mobile */
    .kanban.hidden-mobile { display: none; }
    .chat-panel.hidden-mobile { display: none; }

    /* Task cards */
    .task-card { padding: 10px 12px; }
    .task-title { font-size: 13px; }

    /* Modal */
    .modal-box {
      width: 95vw !important;
      max-width: 95vw !important;
      margin: 0 auto;
      border-radius: 16px;
    }
    .modal-overlay { align-items: flex-end; padding: 0; }
    .modal-box { border-radius: 20px 20px 0 0; }

    /* Chat */
    .chat-messages { padding: 12px; }
    .chat-input-area { padding: 10px 12px; }
    .chat-input { font-size: 14px; min-height: 44px; }
  }

  @media (max-width: 400px) {
    .kpi-row { gap: 4px; }
    .kpi-card { min-width: 62px; padding: 5px 6px; }
    .kpi-count { font-size: 14px; }
    .header-actions .toggle-sidebar { display: none; }
  }
</style>
</head>
<body>
<div class="glow-right"></div>

<!-- HEADER -->
<header class="header">
  <button class="toggle-sidebar" id="toggleSidebar" title="Toggle sidebar">☰</button>
  <div class="logo">⚡ JARVIS OPS</div>

  <div class="kpi-row">
    <div class="kpi-card todo">
      <span class="kpi-icon">📋</span>
      <div class="kpi-info">
        <span class="kpi-count" id="kpi-todo">0</span>
        <span class="kpi-label">Todo</span>
      </div>
    </div>
    <div class="kpi-card inprogress">
      <span class="kpi-icon">⚡</span>
      <div class="kpi-info">
        <span class="kpi-count" id="kpi-inprogress">0</span>
        <span class="kpi-label">In Progress</span>
      </div>
    </div>
    <div class="kpi-card done">
      <span class="kpi-icon">✅</span>
      <div class="kpi-info">
        <span class="kpi-count" id="kpi-done">0</span>
        <span class="kpi-label">Done</span>
      </div>
    </div>
    <div class="kpi-card urgent">
      <span class="kpi-icon">🚨</span>
      <div class="kpi-info">
        <span class="kpi-count" id="kpi-urgent">0</span>
        <span class="kpi-label">Urgent</span>
      </div>
    </div>
  </div>

  <div class="header-actions">
    <button class="btn-new-task" id="btnNewTask">+ New Task</button>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section-title">Categories</div>
    <button class="filter-btn active" data-cat="all" onclick="setCategoryFilter(this, 'all')">
      <span class="dot" style="background:#9997B0"></span> All Tasks
    </button>
    <button class="filter-btn" data-cat="Website" onclick="setCategoryFilter(this, 'Website')">
      <span class="dot" style="background:#6699FF"></span> Website
    </button>
    <button class="filter-btn" data-cat="Sales" onclick="setCategoryFilter(this, 'Sales')">
      <span class="dot" style="background:#34D399"></span> Sales
    </button>
    <button class="filter-btn" data-cat="SEO" onclick="setCategoryFilter(this, 'SEO')">
      <span class="dot" style="background:#FCD34D"></span> SEO
    </button>
    <button class="filter-btn" data-cat="Development" onclick="setCategoryFilter(this, 'Development')">
      <span class="dot" style="background:#A78BFA"></span> Development
    </button>
    <button class="filter-btn" data-cat="Flair NS" onclick="setCategoryFilter(this, 'Flair NS')">
      <span class="dot" style="background:#F472B6"></span> Flair NS
    </button>
    <button class="filter-btn" data-cat="General" onclick="setCategoryFilter(this, 'General')">
      <span class="dot" style="background:#9997B0"></span> General
    </button>
    <button class="filter-btn" data-cat="HR Platform" onclick="setCategoryFilter(this, 'HR Platform')">
      <span class="dot" style="background:#FCA5A5"></span> HR Platform
    </button>

    <hr class="sidebar-divider">
    <div class="sidebar-section-title">Priority</div>
    <button class="filter-btn" data-prio="urgent" onclick="setPriorityFilter(this, 'urgent')">
      <span class="dot" style="background:#EF4444"></span> 🚨 Urgent
    </button>
    <button class="filter-btn" data-prio="high" onclick="setPriorityFilter(this, 'high')">
      <span class="dot" style="background:#F59E0B"></span> 🟠 High
    </button>
    <button class="filter-btn" data-prio="medium" onclick="setPriorityFilter(this, 'medium')">
      <span class="dot" style="background:#0055FF"></span> 🟡 Medium
    </button>
    <button class="filter-btn" data-prio="low" onclick="setPriorityFilter(this, 'low')">
      <span class="dot" style="background:#6B6882"></span> ⚪ Low
    </button>
  </aside>

  <!-- KANBAN -->
  <main class="kanban" id="kanban">
    <div class="kanban-col">
      <div class="col-header todo">
        <span class="col-title">📋 Todo</span>
        <span class="col-count" id="cnt-todo">0</span>
      </div>
      <div class="col-tasks" id="col-todo"></div>
    </div>
    <div class="kanban-col">
      <div class="col-header inprogress">
        <span class="col-title">⚡ In Progress</span>
        <span class="col-count" id="cnt-inprogress">0</span>
      </div>
      <div class="col-tasks" id="col-inprogress"></div>
    </div>
    <div class="kanban-col">
      <div class="col-header done">
        <span class="col-title">✅ Done</span>
        <span class="col-count" id="cnt-done">0</span>
      </div>
      <div class="col-tasks" id="col-done"></div>
    </div>
    <div class="kanban-col">
      <div class="col-header blocked">
        <span class="col-title">🚫 Blocked</span>
        <span class="col-count" id="cnt-blocked">0</span>
      </div>
      <div class="col-tasks" id="col-blocked"></div>
    </div>
  </main>

  <!-- CHAT -->
  <aside class="chat-panel">
    <div class="chat-header">
      <div class="chat-title">
        <div class="chat-status"></div>
        Jarvis Chat
      </div>
      <span style="font-size:11px;color:var(--text-muted)">AI Assistant</span>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <div class="chat-input-wrap">
        <textarea
          class="chat-textarea"
          id="chatInput"
          placeholder="Type a task or message to Jarvis..."
          rows="1"
        ></textarea>
        <button class="btn-send" id="btnSend" title="Send (Ctrl+Enter)">→</button>
      </div>
      <div class="shortcut-hint">Ctrl+Enter to send · Ctrl+N for new task</div>
    </div>
  </aside>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">+ New Task</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input class="form-input" id="f-title" type="text" placeholder="What needs to be done?">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="f-desc" placeholder="Details, context, notes..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="f-status">
          <option value="todo">📋 Todo</option>
          <option value="in_progress">⚡ In Progress</option>
          <option value="done">✅ Done</option>
          <option value="blocked">🚫 Blocked</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="f-priority">
          <option value="urgent">🚨 Urgent</option>
          <option value="high">🟠 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">⚪ Low</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="f-category">
          <option value="Website">Website</option>
          <option value="Sales">Sales</option>
          <option value="SEO">SEO</option>
          <option value="Development">Development</option>
          <option value="Flair NS">Flair NS</option>
          <option value="General" selected>General</option>
          <option value="HR Platform">HR Platform</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input class="form-input" id="f-due" type="date">
      </div>
    </div>
    <button class="btn-save" onclick="saveTask()">⚡ Create Task</button>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
let allTasks = [];
let activeCategory = 'all';
let activePriority = null;
let refreshInterval;

// ─── Init ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  // Restore sidebar preference
  const sidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
  if (sidebarCollapsed) document.getElementById('sidebar').classList.add('collapsed');

  await loadStats();
  await loadTasks();
  await loadMessages();

  // Auto-seed if empty
  if (allTasks.length === 0) await seedTasks();

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); sendMessage(); }
    if (e.ctrlKey && e.key === 'n') { e.preventDefault(); openModal(); }
    if (e.key === 'Escape') closeModal();
  });

  // Auto-resize textarea
  const ta = document.getElementById('chatInput');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
  });

  // Close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // Refresh every 10s
  refreshInterval = setInterval(async () => {
    await loadStats();
    await loadTasks();
  }, 10000);
});

// ─── Sidebar toggle ───────────────────────────────────────
document.getElementById('toggleSidebar').addEventListener('click', () => {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
  localStorage.setItem('sidebarCollapsed', sb.classList.contains('collapsed'));
});

// ─── API helpers ──────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ─── Stats ────────────────────────────────────────────────
async function loadStats() {
  try {
    const stats = await api('/api/stats');
    animateCount('kpi-todo', stats.todo);
    animateCount('kpi-inprogress', stats.in_progress);
    animateCount('kpi-done', stats.done);
    animateCount('kpi-urgent', stats.priority_urgent);
  } catch {}
}

function animateCount(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  const current = parseInt(el.textContent) || 0;
  if (current === val) return;
  el.style.transform = 'scale(1.2)';
  el.textContent = val;
  setTimeout(() => el.style.transform = 'scale(1)', 200);
}

// ─── Tasks ────────────────────────────────────────────────
async function loadTasks() {
  try {
    allTasks = await api('/api/tasks');
    renderKanban();
  } catch {}
}

function renderKanban() {
  const cols = { todo: [], in_progress: [], done: [], blocked: [] };

  allTasks.forEach(t => {
    if (activeCategory !== 'all' && t.category !== activeCategory) return;
    if (activePriority && t.priority !== activePriority) return;
    if (cols[t.status]) cols[t.status].push(t);
  });

  const colMap = { todo: 'todo', in_progress: 'inprogress', done: 'done', blocked: 'blocked' };

  for (const [status, tasks] of Object.entries(cols)) {
    const colId = colMap[status];
    const colEl = document.getElementById(`col-${colId}`);
    const cntEl = document.getElementById(`cnt-${colId}`);
    if (!colEl) continue;
    cntEl.textContent = tasks.length;
    colEl.innerHTML = '';
    if (tasks.length === 0) {
      colEl.innerHTML = `<div class="empty-col">No tasks here</div>`;
    } else {
      tasks.forEach(t => colEl.appendChild(createTaskCard(t)));
    }
  }
}

function getPriorityEmoji(p) {
  return { urgent: '🔴', high: '🟠', medium: '🟡', low: '⚪' }[p] || '⚪';
}

function getCatClass(cat) {
  const map = {
    'Website': 'cat-website', 'Sales': 'cat-sales', 'SEO': 'cat-seo',
    'Development': 'cat-dev', 'Flair NS': 'cat-flairns', 'General': 'cat-general',
    'HR Platform': 'cat-hr'
  };
  return map[cat] || 'cat-general';
}

function createTaskCard(task) {
  const div = document.createElement('div');
  div.className = `task-card ${task.priority}-card`;
  div.dataset.id = task.id;

  const statusOrder = ['todo', 'in_progress', 'done', 'blocked'];
  const idx = statusOrder.indexOf(task.status);
  const prevStatus = idx > 0 ? statusOrder[idx - 1] : null;
  const nextStatus = idx < statusOrder.length - 1 ? statusOrder[idx + 1] : null;
  const statusLabels = { todo: '📋', in_progress: '⚡', done: '✅', blocked: '🚫' };

  div.innerHTML = `
    <div class="task-title">${escHtml(task.title)}</div>
    <div class="task-meta">
      <span class="category-pill ${getCatClass(task.category)}">${escHtml(task.category)}</span>
      <span class="priority-badge">${getPriorityEmoji(task.priority)} ${task.priority}</span>
      ${task.due_date ? `<span class="due-date">📅 ${task.due_date}</span>` : ''}
    </div>
    <div class="task-expanded">
      <div class="task-desc">${escHtml(task.description || 'No description.')}</div>
      <div class="task-actions">
        ${prevStatus ? `<button class="task-btn primary" onclick="moveTask(event,${task.id},'${prevStatus}')">${statusLabels[prevStatus]} Move ←</button>` : ''}
        ${nextStatus ? `<button class="task-btn primary" onclick="moveTask(event,${task.id},'${nextStatus}')">${statusLabels[nextStatus]} Move →</button>` : ''}
        <button class="task-btn danger" onclick="deleteTask(event,${task.id})">🗑 Delete</button>
      </div>
    </div>
  `;

  div.addEventListener('click', e => {
    if (e.target.classList.contains('task-btn')) return;
    div.classList.toggle('expanded');
  });

  return div;
}

async function moveTask(e, id, status) {
  e.stopPropagation();
  try {
    await api(`/api/tasks/${id}`, 'PUT', { status });
    await loadTasks();
    await loadStats();
  } catch (err) { console.error(err); }
}

async function deleteTask(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this task?')) return;
  try {
    await api(`/api/tasks/${id}`, 'DELETE');
    await loadTasks();
    await loadStats();
  } catch (err) { console.error(err); }
}

// ─── Filters ──────────────────────────────────────────────
function setCategoryFilter(btn, cat) {
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('[data-prio]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCategory = cat;
  activePriority = null;
  renderKanban();
}

function setPriorityFilter(btn, prio) {
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('[data-prio]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activePriority = activePriority === prio ? null : prio;
  if (activePriority) btn.classList.add('active'); else btn.classList.remove('active');
  activeCategory = 'all';
  renderKanban();
}

// ─── Messages / Chat ──────────────────────────────────────
async function loadMessages() {
  try {
    const msgs = await api('/api/messages');
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    if (msgs.length === 0) {
      container.innerHTML = `<div style="color:var(--text-muted);text-align:center;font-size:12px;padding:20px 0">
        No messages yet. Say something to Jarvis! 👋
      </div>`;
    } else {
      msgs.forEach(m => container.appendChild(createBubble(m)));
    }
    container.scrollTop = container.scrollHeight;
  } catch {}
}

function createBubble(msg) {
  const div = document.createElement('div');
  const isShrey = msg.sender === 'shrey';
  div.style.display = 'flex';
  div.style.flexDirection = 'column';
  div.style.alignItems = isShrey ? 'flex-end' : 'flex-start';

  const time = new Date(msg.created_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `
    <div class="msg-bubble msg-${isShrey ? 'shrey' : 'jarvis'}">
      ${escHtml(msg.text)}
      <div class="msg-time">${time}</div>
    </div>
  `;
  return div;
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  // Post message
  try {
    await api('/api/messages', 'POST', { text, sender: 'shrey' });
  } catch {}

  // Auto-create task if starts with action verb
  const taskVerbs = /^(build|fix|make|create|add|update|check|analyze|analyse|send|write|set up|setup|submit|get|review|deploy|research|design|implement|configure|test|launch|contact|call|email|schedule|book|plan|prepare|record|document|publish|upload|download|find|track|monitor|report|optimize|improve)/i;
  if (taskVerbs.test(text)) {
    try {
      await api('/api/tasks', 'POST', {
        title: text.charAt(0).toUpperCase() + text.slice(1),
        status: 'todo',
        priority: 'medium',
        category: 'General'
      });
      // Jarvis auto-reply
      setTimeout(async () => {
        await api('/api/messages', 'POST', {
          text: `Got it! I've added "${text.length > 50 ? text.slice(0,50)+'...' : text}" as a task. ✅`,
          sender: 'jarvis'
        });
        await loadMessages();
        await loadTasks();
        await loadStats();
      }, 600);
    } catch {}
  } else {
    // Jarvis generic reply
    setTimeout(async () => {
      const replies = [
        'On it! 🚀',
        'Noted. I\'ll keep that in mind.',
        'Understood! Anything else you need?',
        'Roger that! ⚡',
        'Copy that. What\'s next?',
      ];
      const reply = replies[Math.floor(Math.random() * replies.length)];
      await api('/api/messages', 'POST', { text: reply, sender: 'jarvis' });
      await loadMessages();
    }, 800);
  }

  await loadMessages();
}

document.getElementById('btnSend').addEventListener('click', sendMessage);

// ─── Modal ────────────────────────────────────────────────
document.getElementById('btnNewTask').addEventListener('click', openModal);

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('f-title').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-status').value = 'todo';
  document.getElementById('f-priority').value = 'medium';
  document.getElementById('f-category').value = 'General';
  document.getElementById('f-due').value = '';
}

async function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }

  const task = {
    title,
    description: document.getElementById('f-desc').value.trim(),
    status: document.getElementById('f-status').value,
    priority: document.getElementById('f-priority').value,
    category: document.getElementById('f-category').value,
    due_date: document.getElementById('f-due').value,
  };

  try {
    await api('/api/tasks', 'POST', task);
    closeModal();
    await loadTasks();
    await loadStats();
  } catch (err) { alert('Failed to create task: ' + err.message); }
}

// ─── Seed ─────────────────────────────────────────────────
async function seedTasks() {
  const seedTasks = [
    {title: "Fix mobile responsiveness issues", status:"in_progress", priority:"high", category:"Website"},
    {title: "Submit to Clutch.co + GoodFirms directories", status:"todo", priority:"urgent", category:"SEO"},
    {title: "Claim Google Business Profile", status:"todo", priority:"urgent", category:"SEO"},
    {title: "Build Maharashtra lead outreach campaign", status:"todo", priority:"high", category:"Sales"},
    {title: "Set up Apollo.io for email finding", status:"todo", priority:"high", category:"Sales"},
    {title: "Send cold emails to ZP Pune + Nashik DEOs", status:"todo", priority:"medium", category:"Sales"},
    {title: "Get 5 client Google reviews", status:"todo", priority:"high", category:"SEO"},
    {title: "Update Flair NS website with real phone + email", status:"todo", priority:"urgent", category:"Website"},
    {title: "Add company GSTIN to quotation template", status:"todo", priority:"medium", category:"Flair NS"},
    {title: "Write tender response for ZP Pune ICT tender", status:"todo", priority:"high", category:"Sales"},
  ];

  for (const task of seedTasks) {
    try { await api('/api/tasks', 'POST', task); } catch {}
  }

  // Welcome message from Jarvis
  try {
    await api('/api/messages', 'POST', {
      text: "Hey Shrey! 👋 Your JARVIS OPS dashboard is live. I've pre-loaded your key tasks. Type any task or message below — if it starts with an action word, I'll auto-create it as a task! ⚡",
      sender: 'jarvis'
    });
  } catch {}

  await loadTasks();
  await loadStats();
  await loadMessages();
}

// ─── Utils ────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Mobile Tab Navigation ─────────────────────────────
function initMobileTabs() {
  const kanban = document.querySelector('.kanban');
  const chat = document.querySelector('.chat-panel');
  const tabs = document.querySelectorAll('.mobile-tab');

  function showPanel(panel) {
    if (window.innerWidth > 768) return;
    if (panel === 'kanban') {
      kanban.classList.remove('hidden-mobile');
      chat.classList.add('hidden-mobile');
    } else if (panel === 'chat') {
      chat.classList.remove('hidden-mobile');
      kanban.classList.add('hidden-mobile');
    }
    tabs.forEach(t => t.classList.toggle('active', t.dataset.panel === panel));
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => showPanel(tab.dataset.panel));
  });

  // Default: show kanban on mobile
  if (window.innerWidth <= 768) showPanel('kanban');
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) {
      kanban.classList.remove('hidden-mobile');
      chat.classList.remove('hidden-mobile');
    }
  });
}

document.addEventListener('DOMContentLoaded', initMobileTabs);
</script>

  </button>

    <span>💬</span>Chat
  </button>

  </button>
</nav>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ JARVIS OPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0A0A0F;
  --surface: #111118;
  --surface2: #16161F;
  --border: #1E1E2E;
  --blue: #3B82F6;
  --purple: #8B5CF6;
  --green: #10B981;
  --red: #EF4444;
  --orange: #F59E0B;
  --cyan: #06B6D4;
  --gray: #64748B;
  --text: #E2E8F0;
  --muted: #64748B;
  --sidebar-w: 200px;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 60px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 60px;
  gap: 16px;
}

.logo {
  font-weight: 700;
  font-size: 18px;
  color: var(--blue);
  flex-shrink: 0;
  letter-spacing: -0.3px;
}

.logo span { color: var(--purple); }

.search-wrap {
  flex: 1;
  max-width: 400px;
}

.search-wrap input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}

.search-wrap input:focus { border-color: var(--blue); }
.search-wrap input::placeholder { color: var(--muted); }

.header-actions { margin-left: auto; display: flex; gap: 10px; }

.btn-primary {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.85; }

/* Stat pills */
.stat-bar {
  display: flex;
  align-items: center;
  padding: 0 20px 0 calc(var(--sidebar-w) + 20px);
  gap: 16px;
  height: 36px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

.stat-pill {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
}

.stat-pill b { color: var(--text); }

/* ── LAYOUT ── */
.layout {
  display: flex;
  position: fixed;
  top: 96px; /* header 60 + stat-bar 36 */
  left: 0; right: 0; bottom: 0;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px 0;
}

.sidebar-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0 14px 8px;
}

.filter-btn {
  display: block;
  width: 100%;
  background: none;
  border: none;
  text-align: left;
  padding: 7px 14px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  border-radius: 0;
  transition: color 0.1s, background 0.1s;
}

.filter-btn:hover { background: var(--surface2); color: var(--text); }
.filter-btn.active { color: var(--text); background: var(--surface2); font-weight: 600; }
.filter-btn.active::before { content: ''; display: inline-block; width: 3px; height: 3px; background: var(--blue); border-radius: 50%; margin-right: 8px; vertical-align: middle; }

.sidebar-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 10px 0;
}

/* ── MAIN CONTENT ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Tab bar */
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.tab-btn {
  background: none;
  border: none;
  padding: 12px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s;
}

.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--blue); }

/* ── TASK LIST PANEL ── */
.task-panel {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

.task-panel:not(.show) { display: none; }

.status-group { margin-bottom: 20px; }

.status-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  cursor: pointer;
  user-select: none;
  border-radius: 6px;
}

.status-header:hover { background: var(--surface2); padding: 6px 8px; margin: 0 -8px; }

.status-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--muted);
}

.status-count {
  font-size: 11px;
  background: var(--surface2);
  color: var(--muted);
  border-radius: 10px;
  padding: 1px 7px;
  font-weight: 600;
}

.chevron {
  margin-left: auto;
  font-size: 11px;
  color: var(--muted);
  transition: transform 0.2s;
}

.status-group.collapsed .chevron { transform: rotate(-90deg); }
.status-group.collapsed .task-list-items { display: none; }

/* Urgent = red label */
.status-header[data-status="urgent"] .status-label { color: var(--red); }
.status-header[data-status="in_progress"] .status-label { color: var(--blue); }
.status-header[data-status="done"] .status-label { color: var(--green); }

/* ── TASK ROW ── */
.task-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 4px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.1s;
  border-bottom: 1px solid transparent;
}

.task-row:hover { background: var(--surface2); }

.task-checkbox {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  background: transparent;
}

.task-checkbox:hover { border-color: var(--blue); }
.task-checkbox.checked { background: var(--green); border-color: var(--green); }
.task-checkbox.checked::after { content: '✓'; font-size: 10px; color: #fff; font-weight: 700; }

.task-title-text {
  flex: 1;
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.task-row[data-priority="urgent"] .task-title-text { font-weight: 600; }
.task-checkbox.checked ~ .task-title-text { text-decoration: line-through; color: var(--muted); }

.cat-pill {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
  color: #fff;
}

.prio-dot {
  flex-shrink: 0;
  font-size: 13px;
}

.task-menu-btn {
  flex-shrink: 0;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.1s;
}

.task-row:hover .task-menu-btn { opacity: 1; }

/* Task expand */
.task-expand {
  display: none;
  padding: 8px 4px 8px 30px;
  background: var(--surface2);
  border-radius: 6px;
  margin-bottom: 4px;
  border-left: 2px solid var(--border);
}

.task-expand.show { display: block; }

.task-desc-text {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 10px;
  line-height: 1.5;
}

.task-action-row { display: flex; gap: 8px; flex-wrap: wrap; }

.task-action-btn {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text);
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
}

.task-action-btn:hover { background: var(--surface); }
.task-action-btn.danger { color: var(--red); border-color: var(--red); }
.task-action-btn.danger:hover { background: rgba(239,68,68,0.1); }

/* Context menu */
.context-menu {
  position: fixed;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  z-index: 9999;
  min-width: 160px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}

.context-item {
  display: block;
  width: 100%;
  padding: 7px 12px;
  text-align: left;
  background: none;
  border: none;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  border-radius: 5px;
  transition: background 0.1s;
}

.context-item:hover { background: var(--border); }
.context-item.danger { color: var(--red); }

/* ── CHAT PANEL ── */
.chat-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat-panel:not(.show) { display: none; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg-wrap {
  display: flex;
  flex-direction: column;
}

.msg-wrap.shrey { align-items: flex-end; }
.msg-wrap.jarvis { align-items: flex-start; }

.msg-bubble {
  max-width: 70%;
  padding: 9px 13px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.5;
}

.msg-wrap.shrey .msg-bubble {
  background: var(--blue);
  color: #fff;
  border-radius: 12px 12px 2px 12px;
}

.msg-wrap.jarvis .msg-bubble {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 12px 12px 12px 2px;
}

.msg-time {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  margin-top: 3px;
}

.msg-wrap.jarvis .msg-time { color: var(--muted); }

.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  background: var(--surface);
}

.chat-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}

.chat-input:focus { border-color: var(--blue); }
.chat-input::placeholder { color: var(--muted); }

.btn-send {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}

.btn-send:hover { opacity: 0.85; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  align-items: center;
  justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 440px;
  max-width: 95vw;
}

.modal h3 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--text);
}

.form-row { margin-bottom: 14px; }

.form-row label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.form-control {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  font-family: inherit;
  transition: border-color 0.15s;
}

.form-control:focus { border-color: var(--blue); }
textarea.form-control { resize: vertical; min-height: 80px; }

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 20px;
}

.btn-ghost {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 16px;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  transition: color 0.1s, border-color 0.1s;
}

.btn-ghost:hover { color: var(--text); border-color: var(--text); }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 13px;
}

/* ── MOBILE ── */
@media (max-width: 768px) {
  .sidebar { display: none; }

  .layout { top: 60px; bottom: 56px; }

  .stat-bar { display: none; }

  .header { height: 60px; }

  .filter-chips {
    display: flex !important;
    gap: 8px;
    overflow-x: auto;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    scrollbar-width: none;
  }

  .filter-chip {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.1s;
  }

  .filter-chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  .mobile-tabs {
    display: flex !important;
  }
}

@media (min-width: 769px) {
  .filter-chips { display: none; }
  .mobile-tabs { display: none !important; }
}

.filter-chips { display: none; }

/* Mobile bottom nav */
.mobile-tabs {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 56px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  z-index: 200;
}

.mobile-tab-btn {
  flex: 1;
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  font-size: 10px;
  color: var(--muted);
  cursor: pointer;
  transition: color 0.1s;
}

.mobile-tab-btn .tab-icon { font-size: 18px; }
.mobile-tab-btn.active { color: var(--blue); }
.mobile-tab-btn.add-tab { color: var(--blue); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── CATEGORY PILL COLORS ── */
.cat-Website { background: rgba(59,130,246,0.2); color: #93C5FD; }
.cat-Sales { background: rgba(16,185,129,0.2); color: #6EE7B7; }
.cat-SEO { background: rgba(245,158,11,0.2); color: #FCD34D; }
.cat-Development { background: rgba(139,92,246,0.2); color: #C4B5FD; }
.cat-Flair { background: rgba(239,68,68,0.2); color: #FCA5A5; }
.cat-General { background: rgba(100,116,139,0.2); color: #94A3B8; }
.cat-HR { background: rgba(6,182,212,0.2); color: #67E8F9; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-top">
    <div class="logo">⚡ JARVIS <span>OPS</span></div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search tasks..." oninput="handleSearch(this.value)">
    </div>
    <div class="header-actions">
      <button class="btn-primary" id="btnNewTask" title="Ctrl+N">+ Add Task</button>
    </div>
  </div>
</header>

<!-- Stat bar (desktop) -->
<div class="stat-bar" id="statBar">
  <span class="stat-pill">📋 <b id="statTodo">0</b> Todo</span>
  <span class="stat-pill">⚡ <b id="statActive">0</b> Active</span>
  <span class="stat-pill">✅ <b id="statDone">0</b> Done</span>
  <span class="stat-pill">🚨 <b id="statUrgent">0</b> Urgent</span>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section-title">Filter By</div>

    <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'all')">All Tasks</button>
    <button class="filter-btn" data-filter="urgent" onclick="setFilter(this,'urgent')">🔴 Urgent only</button>
    <button class="filter-btn" data-filter="in_progress" onclick="setFilter(this,'in_progress')">⚡ In Progress</button>

    <hr class="sidebar-divider">

    <div class="sidebar-section-title">Category</div>
    <button class="filter-btn" data-filter="cat:Website" onclick="setFilter(this,'cat:Website')">Website</button>
    <button class="filter-btn" data-filter="cat:Sales" onclick="setFilter(this,'cat:Sales')">Sales</button>
    <button class="filter-btn" data-filter="cat:SEO" onclick="setFilter(this,'cat:SEO')">SEO</button>
    <button class="filter-btn" data-filter="cat:Development" onclick="setFilter(this,'cat:Development')">Development</button>
    <button class="filter-btn" data-filter="cat:Flair NS" onclick="setFilter(this,'cat:Flair NS')">Flair NS</button>
    <button class="filter-btn" data-filter="cat:General" onclick="setFilter(this,'cat:General')">General</button>
    <button class="filter-btn" data-filter="cat:HR Platform" onclick="setFilter(this,'cat:HR Platform')">HR Platform</button>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Mobile filter chips -->
    <div class="filter-chips" id="filterChips">
      <button class="filter-chip active" data-filter="all" onclick="setFilter(this,'all')">All</button>
      <button class="filter-chip" data-filter="urgent" onclick="setFilter(this,'urgent')">🔴 Urgent</button>
      <button class="filter-chip" data-filter="in_progress" onclick="setFilter(this,'in_progress')">⚡ Active</button>
      <button class="filter-chip" data-filter="cat:Website" onclick="setFilter(this,'cat:Website')">Website</button>
      <button class="filter-chip" data-filter="cat:Sales" onclick="setFilter(this,'cat:Sales')">Sales</button>
      <button class="filter-chip" data-filter="cat:SEO" onclick="setFilter(this,'cat:SEO')">SEO</button>
      <button class="filter-chip" data-filter="cat:Development" onclick="setFilter(this,'cat:Development')">Dev</button>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tabTasks" onclick="switchTab('tasks')">Tasks</button>
      <button class="tab-btn" id="tabChat" onclick="switchTab('chat')">Chat</button>
    </div>

    <!-- Task panel -->
    <div class="task-panel show" id="taskPanel">
      <div id="taskGroups"></div>
    </div>

    <!-- Chat panel -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type a task or message...">
        <button class="btn-send" id="btnSend">Send</button>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /layout -->

<!-- Add Task Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleModalClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Add Task</h3>
    <div class="form-row">
      <label>Title *</label>
      <input type="text" class="form-control" id="f-title" placeholder="What needs to be done?">
    </div>
    <div class="form-row">
      <label>Category</label>
      <select class="form-control" id="f-category">
        <option value="General">General</option>
        <option value="Website">Website</option>
        <option value="Sales">Sales</option>
        <option value="SEO">SEO</option>
        <option value="Development">Development</option>
        <option value="Flair NS">Flair NS</option>
        <option value="HR Platform">HR Platform</option>
      </select>
    </div>
    <div class="form-row">
      <label>Priority</label>
      <select class="form-control" id="f-priority">
        <option value="medium">Medium</option>
        <option value="low">Low</option>
        <option value="high">High</option>
        <option value="urgent">Urgent</option>
      </select>
    </div>
    <div class="form-row">
      <label>Status</label>
      <select class="form-control" id="f-status">
        <option value="todo">Todo</option>
        <option value="in_progress">In Progress</option>
        <option value="done">Done</option>
      </select>
    </div>
    <div class="form-row">
      <label>Description (optional)</label>
      <textarea class="form-control" id="f-desc" placeholder="Any notes..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div class="context-menu" id="contextMenu" style="display:none">
  <button class="context-item" id="ctxTodo" onclick="ctxSetStatus('todo')">📋 Mark Todo</button>
  <button class="context-item" id="ctxActive" onclick="ctxSetStatus('in_progress')">⚡ Mark Active</button>
  <button class="context-item" id="ctxDone" onclick="ctxSetStatus('done')">✅ Mark Done</button>
  <button class="context-item danger" onclick="ctxDelete()">🗑 Delete</button>
</div>

<!-- Mobile bottom tabs -->
<nav class="mobile-tabs">
  <button class="mobile-tab-btn active" id="mTabTasks" onclick="switchTab('tasks')">
    <span class="tab-icon">🗂️</span>Tasks
  </button>
  <button class="mobile-tab-btn" id="mTabChat" onclick="switchTab('chat')">
    <span class="tab-icon">💬</span>Chat
  </button>
  <button class="mobile-tab-btn add-tab" onclick="openModal()">
    <span class="tab-icon">➕</span>Add
  </button>
</nav>

<script>
// ── State ──────────────────────────────────────────────────
let allTasks = [];
let activeFilter = 'all';
let searchQuery = '';
let ctxTaskId = null;
let seeded = false;

// ── API helper ────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Category helpers ──────────────────────────────────────
function getCatClass(cat) {
  if (!cat) return 'cat-General';
  const map = { Website:'cat-Website', Sales:'cat-Sales', SEO:'cat-SEO', Development:'cat-Development', 'Flair NS':'cat-Flair', General:'cat-General', 'HR Platform':'cat-HR' };
  return map[cat] || 'cat-General';
}

function getPrioDot(p) {
  return { urgent:'🔴', high:'🟠', medium:'🟡', low:'⚪' }[p] || '⚪';
}

// ── Filter / Search ───────────────────────────────────────
function setFilter(btn, filter) {
  activeFilter = filter;
  // Deselect all filter buttons (both sidebar and chips)
  document.querySelectorAll('.filter-btn, .filter-chip').forEach(b => b.classList.remove('active'));
  // Activate matching ones
  document.querySelectorAll(`[data-filter="${CSS.escape(filter)}"]`).forEach(b => b.classList.add('active'));
  renderTasks();
}

function handleSearch(val) {
  searchQuery = val.toLowerCase();
  renderTasks();
}

function getFilteredTasks() {
  let tasks = [...allTasks];

  if (searchQuery) {
    tasks = tasks.filter(t => (t.title||'').toLowerCase().includes(searchQuery) || (t.description||'').toLowerCase().includes(searchQuery));
  }

  if (activeFilter === 'urgent') {
    tasks = tasks.filter(t => t.priority === 'urgent');
  } else if (activeFilter === 'in_progress') {
    tasks = tasks.filter(t => t.status === 'in_progress');
  } else if (activeFilter.startsWith('cat:')) {
    const cat = activeFilter.slice(4);
    tasks = tasks.filter(t => t.category === cat);
  }

  return tasks;
}

// ── Render tasks ──────────────────────────────────────────
function renderTasks() {
  const filtered = getFilteredTasks();
  const container = document.getElementById('taskGroups');
  container.innerHTML = '';

  // Group definitions
  const groups = [
    { id: 'urgent',      label: 'URGENT',      emoji: '🚨', match: t => t.priority === 'urgent' && t.status !== 'done' },
    { id: 'in_progress', label: 'IN PROGRESS',  emoji: '⚡', match: t => t.status === 'in_progress' && t.priority !== 'urgent' },
    { id: 'todo',        label: 'TODO',         emoji: '📋', match: t => t.status === 'todo' && t.priority !== 'urgent' },
    { id: 'done',        label: 'DONE',         emoji: '✅', match: t => t.status === 'done' },
  ];

  let anyTask = false;

  groups.forEach(group => {
    const tasks = filtered.filter(group.match);

    const section = document.createElement('div');
    section.className = 'status-group';
    section.innerHTML = `
      <div class="status-header" data-status="${group.id}" onclick="toggleGroup(this)">
        <span style="font-size:14px">${group.emoji}</span>
        <span class="status-label">${group.label}</span>
        <span class="status-count">${tasks.length}</span>
        <span class="chevron">▾</span>
      </div>
      <div class="task-list-items"></div>
    `;

    const listEl = section.querySelector('.task-list-items');

    if (tasks.length === 0) {
      listEl.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:6px 4px">No tasks</div>`;
    } else {
      anyTask = true;
      tasks.forEach(task => {
        const row = createTaskRow(task);
        listEl.appendChild(row);
      });
    }

    container.appendChild(section);
  });

  if (!anyTask && searchQuery) {
    container.innerHTML = `<div class="empty-state">No tasks match "${escHtml(searchQuery)}"</div>`;
  }
}

function toggleGroup(header) {
  const group = header.closest('.status-group');
  group.classList.toggle('collapsed');
}

function createTaskRow(task) {
  const wrap = document.createElement('div');

  const isDone = task.status === 'done';
  const checkClass = isDone ? 'checked' : '';

  wrap.innerHTML = `
    <div class="task-row" data-priority="${task.priority||'medium'}" data-id="${task.id}">
      <div class="task-checkbox ${checkClass}" onclick="toggleDone(event,${task.id},'${task.status}')"></div>
      <span class="task-title-text">${escHtml(task.title)}</span>
      <span class="cat-pill ${getCatClass(task.category)}">${escHtml(task.category||'General')}</span>
      <span class="prio-dot" title="${task.priority}">${getPrioDot(task.priority)}</span>
      <button class="task-menu-btn" onclick="openCtxMenu(event,${task.id})" title="More">⋯</button>
    </div>
    <div class="task-expand" id="expand-${task.id}">
      <div class="task-desc-text">${escHtml(task.description||'No description.')}</div>
      <div class="task-action-row">
        ${task.status !== 'todo' ? `<button class="task-action-btn" onclick="moveTask(event,${task.id},'todo')">📋 Todo</button>` : ''}
        ${task.status !== 'in_progress' ? `<button class="task-action-btn" onclick="moveTask(event,${task.id},'in_progress')">⚡ Active</button>` : ''}
        ${task.status !== 'done' ? `<button class="task-action-btn" onclick="moveTask(event,${task.id},'done')">✅ Done</button>` : ''}
        <button class="task-action-btn danger" onclick="deleteTask(event,${task.id})">🗑 Delete</button>
      </div>
    </div>
  `;

  // Click row to expand (not clicking checkbox/menu/buttons)
  wrap.querySelector('.task-row').addEventListener('click', e => {
    if (e.target.classList.contains('task-checkbox') || e.target.classList.contains('task-menu-btn') || e.target.classList.contains('task-action-btn')) return;
    const exp = wrap.querySelector('.task-expand');
    exp.classList.toggle('show');
  });

  return wrap;
}

// ── Task actions ──────────────────────────────────────────
async function toggleDone(e, id, currentStatus) {
  e.stopPropagation();
  const newStatus = currentStatus === 'done' ? 'todo' : 'done';
  await moveTask(e, id, newStatus);
}

async function moveTask(e, id, status) {
  if (e) e.stopPropagation();
  try {
    await api(`/api/tasks/${id}`, 'PUT', { status });
    await loadTasks();
    await loadStats();
  } catch (err) { console.error(err); }
}

async function deleteTask(e, id) {
  if (e) e.stopPropagation();
  if (!confirm('Delete this task?')) return;
  try {
    await api(`/api/tasks/${id}`, 'DELETE');
    await loadTasks();
    await loadStats();
  } catch (err) { console.error(err); }
}

// ── Context menu ──────────────────────────────────────────
function openCtxMenu(e, taskId) {
  e.stopPropagation();
  ctxTaskId = taskId;
  const menu = document.getElementById('contextMenu');
  menu.style.display = 'block';
  const x = Math.min(e.clientX, window.innerWidth - 170);
  const y = Math.min(e.clientY, window.innerHeight - 160);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
}

async function ctxSetStatus(status) {
  closeCtxMenu();
  if (ctxTaskId) await moveTask(null, ctxTaskId, status);
}

async function ctxDelete() {
  closeCtxMenu();
  if (ctxTaskId) await deleteTask(null, ctxTaskId);
}

function closeCtxMenu() {
  document.getElementById('contextMenu').style.display = 'none';
}

document.addEventListener('click', closeCtxMenu);

// ── Load tasks & stats ────────────────────────────────────
async function loadTasks() {
  try {
    allTasks = await api('/api/tasks');
    renderTasks();
  } catch (err) { console.error('loadTasks:', err); }
}

async function loadStats() {
  try {
    const stats = await api('/api/stats');
    document.getElementById('statTodo').textContent = stats.todo || 0;
    document.getElementById('statActive').textContent = stats.in_progress || 0;
    document.getElementById('statDone').textContent = stats.done || 0;
    document.getElementById('statUrgent').textContent = (allTasks||[]).filter(t => t.priority === 'urgent' && t.status !== 'done').length;
  } catch (err) { console.error('loadStats:', err); }
}

// ── Messages / Chat ───────────────────────────────────────
async function loadMessages() {
  try {
    const msgs = await api('/api/messages');
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    if (msgs.length === 0) {
      container.innerHTML = `<div class="empty-state">No messages yet. Say something! 👋</div>`;
    } else {
      msgs.forEach(m => container.appendChild(createBubble(m)));
    }
    container.scrollTop = container.scrollHeight;
  } catch {}
}

function createBubble(msg) {
  const div = document.createElement('div');
  const isShrey = msg.sender === 'shrey';
  div.className = `msg-wrap ${isShrey ? 'shrey' : 'jarvis'}`;
  const time = new Date(msg.created_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `
    <div class="msg-bubble">
      ${escHtml(msg.text)}
      <div class="msg-time">${time}</div>
    </div>
  `;
  return div;
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  try { await api('/api/messages', 'POST', { text, sender: 'shrey' }); } catch {}

  const taskVerbs = /^(build|fix|make|create|add|update|check|analyze|analyse|send|write|set up|setup|submit|get|review|deploy|research|design|implement|configure|test|launch|contact|call|email|schedule|book|plan|prepare|record|document|publish|upload|download|find|track|monitor|report|optimize|improve)/i;

  if (taskVerbs.test(text)) {
    try {
      await api('/api/tasks', 'POST', {
        title: text.charAt(0).toUpperCase() + text.slice(1),
        status: 'todo',
        priority: 'medium',
        category: 'General'
      });
      setTimeout(async () => {
        await api('/api/messages', 'POST', {
          text: `Got it! Added "${text.length > 50 ? text.slice(0,50)+'...' : text}" as a task. ✅`,
          sender: 'jarvis'
        });
        await loadMessages();
        await loadTasks();
        await loadStats();
      }, 600);
    } catch {}
  } else {
    setTimeout(async () => {
      const replies = ['On it! 🚀','Noted.','Understood! Anything else?','Roger that! ⚡','Copy that. What\'s next?'];
      await api('/api/messages', 'POST', { text: replies[Math.floor(Math.random()*replies.length)], sender: 'jarvis' });
      await loadMessages();
    }, 800);
  }

  await loadMessages();
}

document.getElementById('btnSend').addEventListener('click', sendMessage);

// ── Modal ─────────────────────────────────────────────────
document.getElementById('btnNewTask').addEventListener('click', openModal);

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('f-title').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  ['f-title','f-desc'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('f-status').value = 'todo';
  document.getElementById('f-priority').value = 'medium';
  document.getElementById('f-category').value = 'General';
}

function handleModalClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

async function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const task = {
    title,
    description: document.getElementById('f-desc').value.trim(),
    status: document.getElementById('f-status').value,
    priority: document.getElementById('f-priority').value,
    category: document.getElementById('f-category').value,
  };
  try {
    await api('/api/tasks', 'POST', task);
    closeModal();
    await loadTasks();
    await loadStats();
  } catch (err) { alert('Failed: ' + err.message); }
}

// ── Seed ──────────────────────────────────────────────────
async function seedTasks() {
  const seeds = [
    {title:"Fix mobile responsiveness issues", status:"in_progress", priority:"high", category:"Website"},
    {title:"Submit to Clutch.co + GoodFirms directories", status:"todo", priority:"urgent", category:"SEO"},
    {title:"Claim Google Business Profile", status:"todo", priority:"urgent", category:"SEO"},
    {title:"Build Maharashtra lead outreach campaign", status:"todo", priority:"high", category:"Sales"},
    {title:"Set up Apollo.io for email finding", status:"todo", priority:"high", category:"Sales"},
    {title:"Send cold emails to ZP Pune + Nashik DEOs", status:"todo", priority:"medium", category:"Sales"},
    {title:"Get 5 client Google reviews", status:"todo", priority:"high", category:"SEO"},
    {title:"Update Flair NS website with real phone + email", status:"todo", priority:"urgent", category:"Website"},
    {title:"Add company GSTIN to quotation template", status:"todo", priority:"medium", category:"Flair NS"},
    {title:"Write tender response for ZP Pune ICT tender", status:"todo", priority:"high", category:"Sales"},
  ];
  for (const task of seeds) {
    try { await api('/api/tasks', 'POST', task); } catch {}
  }
  try {
    await api('/api/messages', 'POST', {
      text: "Hey Shrey! 👋 JARVIS OPS is live. I've pre-loaded your tasks. Type any task below — if it starts with an action word, I'll auto-create it! ⚡",
      sender: 'jarvis'
    });
  } catch {}
  await loadTasks();
  await loadStats();
  await loadMessages();
}

// ── Tab switching ─────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('taskPanel').classList.toggle('show', tab === 'tasks');
  document.getElementById('chatPanel').classList.toggle('show', tab === 'chat');
  document.getElementById('tabTasks').classList.toggle('active', tab === 'tasks');
  document.getElementById('tabChat').classList.toggle('active', tab === 'chat');
  if (document.getElementById('mTabTasks')) {
    document.getElementById('mTabTasks').classList.toggle('active', tab === 'tasks');
    document.getElementById('mTabChat').classList.toggle('active', tab === 'chat');
  }
  if (tab === 'chat') loadMessages();
}

// ── Keyboard shortcuts ────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'n') { e.preventDefault(); openModal(); }
  if (e.ctrlKey && e.key === 'Enter') {
    const activeEl = document.activeElement;
    if (activeEl && activeEl.id === 'chatInput') sendMessage();
  }
  if (e.key === 'Escape') { closeModal(); closeCtxMenu(); }
});

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Utils ─────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────
async function init() {
  try {
    const tasks = await api('/api/tasks');
    if (!tasks || tasks.length === 0) {
      seeded = true;
      await seedTasks();
    } else {
      allTasks = tasks;
      renderTasks();
      await loadStats();
      await loadMessages();
    }
  } catch {
    await seedTasks();
  }
}

// Auto-refresh every 10 seconds
setInterval(async () => {
  await loadTasks();
  await loadStats();
}, 10000);

init();
</script>
</body>
</html>
